; File ini dibaca otomatis oleh PHP (FPM, CGI, maupun mod_php) tanpa perlu
; akses ke php.ini utama atau restart manual — cukup tunggu beberapa saat
; (default PHP cek ulang tiap 300 detik) atau restart Apache/Nginx di Laragon
; supaya langsung berlaku.

upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 300
max_input_time = 300
memory_limit = 256M
